name: Final timeline scroll fix

on:
  push:
    paths:
      - ".github/workflows/final-timeline-scroll-fix.yml"

permissions:
  contents: write

jobs:
  patch-timeline-scroll:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Spread timeline movement across the whole page
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("script.js")
          text = path.read_text(encoding="utf-8")

          old = '''    const startingOffset = Math.min(window.innerHeight * 0.18, 170);
              const upwardLimit = Math.min(window.innerHeight * 0.2, 190);
              targetAmbientY = Math.max(startingOffset - scrollTop * 0.14, -upwardLimit);'''

          new = '''    const pageProgress = scrollHeight > 0 ? Math.min(scrollTop / scrollHeight, 1) : 0;
              const startingOffset = Math.min(window.innerHeight * 0.18, 170);
              const endingOffset = -Math.min(window.innerHeight * 0.42, 380);
              targetAmbientY = startingOffset + (endingOffset - startingOffset) * pageProgress;'''

          if new in text:
              print("Timeline scroll behavior is already updated.")
          elif old not in text:
              raise SystemExit("Expected timeline scroll block was not found.")
          else:
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Commit the final adjustment
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add script.js
          git commit -m "Make timeline movement span the full page"
          git push
